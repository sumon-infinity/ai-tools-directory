      position: relative;
      overflow: hidden;
    }
    .header::before {

      background: radial-gradient(circle at 20% 50%, rgba(30,107,60,0.08) 0%, transparent 50%),

    .header-label { color: #2E9955; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
    .header-title {

      color: #2E9955; font-size: 12px; font-family: 'IBM Plex Mono', monospace;

    /* ── LAYOUT ── */
    .layout {
      max-width: 1400px; margin: 0 auto; padding: 0 24px;
      display: flex; gap: 0; min-height: calc(100vh - 220px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 230px; min-width: 230px;
      padding-top: 24px; padding-right: 18px;
      border-right: 1px solid #141428;
      position: sticky; top: 0;
      max-height: calc(100vh - 60px); overflow-y: auto;
    }
    .sidebar-label {
      font-size: 10px; color: #475569; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 12px; padding-left: 8px;

    .dept-btn {

    .dept-btn.active { background: #1E6B3C; border-color: #2E9955; color: #A8D5B5; }

    .cat-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }

    .result-count .green { color: #2E9955; }

    .section-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .section-title {

    .section-line { flex: 1; height: 1px; background: #141428; }
    .section-count { color: #475569; font-size: 11px; white-space: nowrap; }

    /* ── GRID ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(275px, 1fr)); gap: 12px; }

    /* ── CARD ── */
    .card {
      background: #0D0D1A; border: 1px solid #181828;
      border-radius: 10px; padding: 16px;
      display: flex; flex-direction: column; gap: 10px; transition: all 0.2s;

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let activeDept = 'All Tools';
let activeCategory = 'All';

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return allTools.filter(t => {
    const matchDept = activeDept === 'All Tools' || t.tags.includes(activeDept);
    const matchSearch = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.category.toLowerCase().includes(q);
    const matchCat = activeCategory === 'All' || t.category === activeCategory;
    return matchDept && matchSearch && matchCat;
  });
}

function getGrouped(filtered) {
  const g = {};
  filtered.forEach(t => {
    if (!g[t.category]) g[t.category] = [];
    g[t.category].push(t);
  });
  return g;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('deptList');
  list.innerHTML = departments.map(d => {
    const count = d === 'All Tools' ? allTools.length : allTools.filter(t => t.tags.includes(d)).length;
    return `<button class="dept-btn${activeDept===d?' active':''}" onclick="setDept('${escHtml(d)}')" >
      <span>${escHtml(d)}</span>
      <span class="dept-count">${count}</span>
    </button>`;
  }).join('');
}

function buildCatPills(filtered) {
  const cats = ['All', ...[...new Set(filtered.map(t=>t.category))].sort()];
  document.getElementById('catPills').innerHTML = cats.map(c =>
    `<button class="cat-pill${activeCategory===c?' active':''}" onclick="setCat('${escHtml(c)}')">${escHtml(c)}</button>`
  ).join('');
}

function buildResultCount(filtered) {
  let html = `Showing <span class="green">${filtered.length}</span> tools`;
  if (activeDept !== 'All Tools') html += ` in <span class="green-soft">${escHtml(activeDept)}</span>`;
  if (activeCategory !== 'All') html += ` › <span class="green-soft">${escHtml(activeCategory)}</span>`;
  document.getElementById('resultCount').innerHTML = html;
}

function buildTools(filtered) {
  const grouped = getGrouped(filtered);
  const container = document.getElementById('toolsContainer');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>No tools found for your search</p></div>`;
    return;
  }
  container.innerHTML = Object.keys(grouped).sort().map(cat => {
    const color = categoryColors[cat] || '#2E9955';
    const cards = grouped[cat].map(tool => {
      const shortTags = tool.tags.map(tag => tag.length > 15 ? tag.split(' ')[0] : tag);
      return `<div class="card">
        <div class="card-top">
          <div>
            <div class="card-name">${escHtml(tool.name)}</div>
            <span class="card-cat" style="background:${color}18;color:${color};border:1px solid ${color}35">${escHtml(cat)}</span>
          </div>
        </div>
        <p class="card-desc">${escHtml(tool.desc)}</p>
        <div class="card-footer">
          <div class="card-tags">${shortTags.map(t=>`<span class="card-tag">${escHtml(t)}</span>`).join('')}</div>
          <a href="${escHtml(tool.url)}" target="_blank" rel="noopener noreferrer" class="visit-btn">VISIT →</a>
        </div>
      </div>`;
    }).join('');
    return `<section class="section">
      <div class="section-header">
        <span class="section-dot" style="background:${color};box-shadow:0 0 8px ${color}"></span>
        <h2 class="section-title">${escHtml(cat)}</h2>
        <div class="section-line"></div>
        <span class="section-count">${grouped[cat].length} tools</span>
      </div>
      <div class="grid">${cards}</div>
    </section>`;
  }).join('');
}

function render() {
  const filtered = getFiltered();
  buildCatPills(filtered);
  buildResultCount(filtered);
  buildTools(filtered);
}

function setDept(dept) {
  activeDept = dept;
  activeCategory = 'All';
  buildSidebar();
  render();
  if (window.innerWidth <= 768) toggleSidebar(false);
}

function setCat(cat) {
  activeCategory = cat;
  render();
  document.getElementById('catPills').querySelectorAll('.cat-pill').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === cat);
  });
}

function toggleSidebar(forceClose) {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('mobileMenuBtn');
  if (forceClose === false || sb.classList.contains('open')) {
    sb.classList.remove('open');
    btn.textContent = '☰ Departments';
  } else {
    sb.classList.add('open');
    btn.textContent = '✕ Close';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('toolCountSub').textContent =
    `${allTools.length} AI tools across 11 departments — your roadmap to becoming an AI Architect`;
  document.getElementById('footerText').textContent =
    `Built for Live Corps Ltd. · AI Architecture Reference · ${allTools.length} tools across ${departments.length-1} departments · Dhaka, Bangladesh`;
  buildSidebar();
  render();
});
</script>
